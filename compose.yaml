services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./config/local-secrets.env
    environment:
      MYSQL_DATABASE: openpickle
      MYSQL_USER: openpickle
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./config/local-secrets.env
    environment:
      SPRING_PROFILES_ACTIVE: docker

      # --- Global ladder bootstrap (default OFF) ---
      # Only set these to true if you intentionally want a universal/global ladder.
      #FHPB_BOOTSTRAP_GLOBAL_LADDER_ENABLED: "false"
      #FHPB_BOOTSTRAP_GLOBAL_LADDER_AUTO_ENROLL_NEW: "false"
      #FHPB_BOOTSTRAP_GLOBAL_LADDER_ASSIGN_ALL: "false"

      #APP_ADMIN_EMAIL: admin@example.com
      #APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?set-a-strong-secret}
      #APP_USER_EMAIL: player@example.com
      #APP_USER_PASSWORD: ${APP_USER_PASSWORD:?set-a-strong-secret}

    ports:
      - "8090:8090"
    volumes:
      - app_logs:/app/logs

volumes:
  dbdata:
  app_logs:
