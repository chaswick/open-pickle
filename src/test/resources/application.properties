spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway migrations in tests (they're written for MySQL, not H2)
spring.flyway.enabled=false

# Avoid trying to send email during tests
spring.mail.host=localhost
spring.mail.port=1025

# Required email configuration for test context
support.email=test@example.com

# Disable CSRF for tests so endpoints are accessible without tokens
spring.security.filter.csrf.enabled=false
