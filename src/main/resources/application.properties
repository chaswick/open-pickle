fhpb.ai.trophies.prompts.unlock-expression.common[0]=matches_played >= 3
fhpb.ai.trophies.prompts.unlock-expression.common[1]=distinct_match_days >= 3
fhpb.ai.trophies.prompts.unlock-expression.uncommon[0]=unique_opponents >= 5
fhpb.ai.trophies.prompts.unlock-expression.uncommon[1]=unique_partners >= 2 && matches_won >= 1
fhpb.ai.trophies.prompts.unlock-expression.rare[0]=consecutive_wins >= 3
fhpb.ai.trophies.prompts.unlock-expression.rare[1]=wins_by_margin_2 >= 3
fhpb.ai.trophies.prompts.unlock-expression.epic[0]=consecutive_wins >= 7
fhpb.ai.trophies.prompts.unlock-expression.epic[1]=days_since_last_match >= 7 && matches_played_today >= 3
fhpb.ai.trophies.prompts.unlock-expression.legendary[0]=is_final_overall_leader == 1
fhpb.ai.trophies.prompts.unlock-expression.legendary[1]=is_final_band_champion == 1

