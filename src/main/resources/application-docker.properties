spring.datasource.url=jdbc:mysql://db:3306/openpickle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Docker dev now uses Flyway to rebuild schema on every startup so local environments
# match the real migration path instead of drifting through Hibernate updates.
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.jpa.hibernate.ddl-auto=validate

fhpb.trophy.storage.root-directory=/data/trophy-storage

# Enhanced logging for debugging
#logging.level.root=INFO
#logging.level.com.w3llspring.fhpb=DEBUG
logging.level.com.w3llspring.fhpb.web.service.meetups=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.transaction=DEBUG
#logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG

# Enable detailed error logging to console/server logs
#logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
#logging.level.org.springframework.web.servlet.handler.AbstractHandlerExceptionResolver=DEBUG
#logging.level.org.springframework.boot.web.servlet.error.ErrorMvcAutoConfiguration=DEBUG
#logging.level.org.springframework.boot.autoconfigure.web.servlet.error=DEBUG

# Keep error details in logs only, not user-facing
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never


# Dev data seeding configuration
# Set to true to rebuild schema from Flyway and reseed on each startup.
fhpb.dev.reset-data-on-startup=true
fhpb.dev.reset-schema-on-startup=${FHPB_DEV_RESET_SCHEMA_ON_STARTUP:true}

# Docker is used as a local dev environment here, so keep match logging unrestricted.
fhpb.match-log.rate-limit.enabled=false
