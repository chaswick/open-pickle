
<meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0" th:fragment="cache-control" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
<meta http-equiv="pragma" content="no-cache" />


<th:block th:fragment="basic-meta">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</th:block>


<th:block th:fragment="theme-meta">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</th:block>


<th:block th:fragment="js-ready-marker">
    <script>
        document.documentElement.classList.add('js');
    </script>
</th:block>


<th:block th:fragment="public-social-image"
          th:with="
              publicBase=${#strings.trim(publicMetadataBaseUrl)},
              logoPath=${branding.socialImagePath + '?v=' + assetVersion},
              logoUrl=${#strings.isEmpty(publicBase) ? logoPath : publicBase + logoPath}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Open-Pickle" th:content="${branding.appName}">
    <meta property="og:image" content="/images/landing/op_logo.png" th:content="${logoUrl}">
    <meta property="og:image:secure_url" content="/images/landing/op_logo.png" th:content="${logoUrl}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:image:alt" content="Open-Pickle logo" th:content="${branding.socialImageAlt}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="/images/landing/op_logo.png" th:content="${logoUrl}">
    <link rel="image_src" href="/images/landing/op_logo.png" th:href="${logoUrl}">
</th:block>
