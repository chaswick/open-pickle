<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/authenticated}">

<head>
  <title layout:fragment="title" th:text="${'Trophy Season: ' + (seasonCatalog?.seasonName ?: 'Unknown')}">Trophy Season</title>
  
  <div layout:fragment="styles">
    <div th:replace="~{components/head-styles :: core-styles}"></div>
        <link rel="preload" as="image" href="/images/trophy/TrophyLocked.png" th:href="@{/images/trophy/TrophyLocked.png}">
  </div>
  
</head>

<body>
  <div layout:fragment="content">
    
    <div th:replace="~{components/back-button :: back-button-auto(@{/trophies}, 'Back to Trophy Room', ${seasonCatalog?.seasonName})}"></div>
    
    <div class="container py-4 trophy-page-offset">
      
      <div th:if="${seasonCatalog != null}" class="card mb-4 shadow card-spotlight"
          th:with="cardsToDisplay=${seasonCatalog.currentSeason ? seasonCatalog.cards : seasonCatalog.cards.?[ownedByUser]}, cardCount=${cardsToDisplay != null ? cardsToDisplay.size() : 0}">
          <div class="card-header card-header-title d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-2">
              <div>
                  <h4 class="fw-semibold mb-1 mb-lg-0 text-center text-lg-start"
                      th:text="${seasonCatalog.seasonName}"></h4>
                  <p class="mb-0 text-muted small text-center text-lg-start"
                      th:with="dateRange=${seasonCatalog.seasonStart != null and seasonCatalog.seasonEnd != null ? #temporals.format(seasonCatalog.seasonStart, 'MMM d, yyyy') + ' - ' + #temporals.format(seasonCatalog.seasonEnd, 'MMM d, yyyy') : null}"
                      th:text="${dateRange != null ? dateRange : 'Season dates to be announced'}"></p>
              </div>
              <div class="text-center text-lg-end">
                  <span class="badge bg-success text-white" th:if="${seasonCatalog.currentSeason}">Active season</span>
                  <p class="mb-0 small text-muted"
                      th:text="${seasonCatalog.currentSeason ? (cardCount == 1 ? '1 trophy available' : cardCount + ' trophies available') : (cardCount == 1 ? '1 trophy collected' : cardCount + ' trophies collected')}">
                  </p>
              </div>
          </div>
          <div class="card-body">
              <div th:if="${cardsToDisplay == null or #lists.isEmpty(cardsToDisplay)}" class="text-center py-4">
                  <img src="/images/trophy/trophy-empty-state.png"
                      th:src="@{/images/trophy/trophy-empty-state.png}"
                      alt="No trophies"
                      class="img-fluid mb-3 trophy-placeholder-image">
                  <p class="lead mb-2">No trophies collected yet.</p>
                  <p class="text-muted mb-0" th:if="${seasonCatalog.currentSeason}">Unlock trophies to see them appear here.</p>
                  <p class="text-muted mb-0" th:if="${!seasonCatalog.currentSeason}">You did not mint any trophies in this season.</p>
              </div>

              <div th:if="${cardsToDisplay != null and !#lists.isEmpty(cardsToDisplay)}"
                  class="row row-cols-1 row-cols-sm-2 g-4 justify-content-center">
                  <div class="col d-flex" th:each="trophy : ${cardsToDisplay}">
                      <div class="card shadow-sm trophy-card flex-fill">
                          <div class="card-body">
                              <div class="trophy-art-shell">
                                  <img th:if="${trophy.ownedByUser && trophy.imageAvailable}"
                                      th:src="${trophy.imageUrl}" alt="Trophy art" loading="lazy">
                                  <img th:if="${seasonCatalog.currentSeason && !trophy.ownedByUser}"
                                      src="/images/trophy/TrophyLocked.png"
                                      th:src="@{/images/trophy/TrophyLocked.png}"
                                      alt="Locked trophy placeholder"
                                      loading="eager">
                                  <div th:if="${trophy.ownedByUser && !trophy.imageAvailable}"
                                      class="trophy-art-placeholder">
                                      <span>Trophy art is rendering...</span>
                                  </div>
                              </div>

                              <div class="text-center mb-2">
                                  <h3 class="h6 mb-1" th:text="${trophy.title}"></h3>
                                  <span class="badge trophy-rarity-badge text-uppercase small"
                                      th:classappend=" ' ' + trophy.rarityCssClass"
                                      th:text="${trophy.rarity}"></span>
                              </div>
                              <div class="mb-3 text-center">
                                  <span class="fw-semibold text-uppercase small text-muted d-block">Unlock</span>
                                  <p class="mb-0 small" th:text="${trophy.unlockCondition}"></p>
                              </div>

                              <div class="mt-auto trophy-meta-badges text-center">
                                  <div class="d-flex flex-wrap gap-2 align-items-center justify-content-center text-center">
                                      <span class="badge badge-limited" th:if="${trophy.limited}"
                                          th:text="${seasonCatalog.currentSeason ? (trophy.maxClaims != null ? 'Limited: ' + trophy.maxClaims + ' minted' : 'Limited edition') : 'Limited'}"></span>
                                      <span class="badge bg-secondary text-white" th:if="${trophy.repeatable}">Repeatable</span>
                                      <span class="badge bg-success text-white" th:if="${trophy.ownedByUser}">You unlocked this</span>
                                  </div>
                                  <p class="small text-muted mb-0 mt-2 text-center"
                                      th:if="${trophy.repeatable and trophy.ownedByUser}"
                                      th:text="${trophy.earnedCount == 1 ? 'You earned this 1 time.' : 'You earned this ' + trophy.earnedCount + ' times.'}">
                                  </p>
                                  <p class="small text-muted mb-0 mt-2 text-center"
                                      th:text="${trophy.ownerCount == 1 ? '1 player has earned this.' : trophy.ownerCount + ' players have earned this.'}">
                                  </p>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </div>
      
      <div th:if="${seasonCatalog == null}" class="alert alert-warning mt-5" role="status">
          No season details available.
      </div>
    </div>
  </div>
</body>
</html>
