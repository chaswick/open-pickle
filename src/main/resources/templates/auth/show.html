<!DOCTYPE html>
<html lang="en" layout:decorate="~{layouts/authenticated}">

<head>
  <title layout:fragment="title" th:text="${isSessionLadder ? sessionDisplayTitle : ladder.title}">Group</title>
  <meta layout:fragment="meta-tags">
  <style layout:fragment="styles">
    .stack-center {
      max-width: 420px;
      margin: 0 auto;
    }

    .stack-center>* {
      margin-bottom: .75rem;
    }

    @media (max-width: 420px) {

      .stack-center .btn,
      .stack-center .form-control,
      .stack-center .form-select {
        min-height: 44px;
      }

      .stack-center .btn-sm {
        padding: .5rem .75rem;
        font-size: 1rem;
      }
    }

    .stack-center.stack-full {
      max-width: 100%;
    }

    .invite-share-qr .invite-qr-wrapper {
      width: 176px;
      height: 176px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .invite-link-field {
      max-width: 420px;
    }

    .invite-link-actions {
      max-width: 176px;
      margin-left: auto;
      margin-right: auto;
    }

    .session-code-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 10rem;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(18, 68, 122, 0.16);
      background: #f8fbff;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .session-share-methods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 0.5rem;
      width: 100%;
      max-width: 34rem;
      margin: 0 auto;
    }

    .session-share-method {
      border: 1px solid rgba(18, 68, 122, 0.16);
      border-radius: 0.9rem;
      background: #ffffff;
      color: #23405e;
      font-weight: 700;
      transition: background-color .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .session-share-method:hover,
    .session-share-method:focus-visible {
      border-color: rgba(18, 68, 122, 0.34);
      color: #163757;
    }

    .session-share-method.is-active,
    .session-share-method[aria-pressed="true"] {
      background: #12447a;
      border-color: #12447a;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(18, 68, 122, 0.16);
    }

    .session-share-panel {
      border: 1px solid rgba(18, 68, 122, 0.12);
      border-radius: 1rem;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      padding: 1rem;
    }

    .session-share-panel[hidden] {
      display: none !important;
    }

    .session-share-panel-intro {
      font-size: 1rem;
      font-weight: 700;
      color: #173c61;
    }

    .session-share-panel-actions {
      width: 100%;
      max-width: 14rem;
      margin: 0 auto;
    }

    .session-share-footer {
      padding-top: 0.25rem;
      border-top: 1px solid rgba(18, 68, 122, 0.1);
    }

    .join-request-status:empty {
      display: none;
    }

    @media (max-width: 576px) {
      .invite-share-qr .invite-qr-wrapper {
        width: 200px;
        height: 200px;
      }

      .invite-link-actions {
        max-width: 200px;
      }
    }

    .identity-note {
      font-size: .9rem;
    }

    .session-standing-preview {
      border: 1px solid rgba(18, 68, 122, 0.12);
      border-radius: 0.85rem;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      padding: 0.9rem 1rem;
      color: inherit;
      transition: box-shadow .18s ease, border-color .18s ease, transform .18s ease;
    }

    .session-standing-grid {
      display: grid;
      grid-template-columns: 3.5rem 3rem minmax(0, 1fr) auto;
      gap: 0.75rem;
      align-items: center;
      min-width: 0;
    }

    .session-standing-player {
      min-width: 0;
      overflow: visible;
    }

    .session-standing-band {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #55697f;
      margin-bottom: 0.55rem;
    }

    .session-standing-labels {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6c7f92;
      margin-bottom: 0.35rem;
    }

    .session-standing-value {
      font-weight: 600;
    }

    .session-standing-momentum {
      justify-self: center;
      text-align: center;
      font-size: 0.65rem;
      padding: 0.15rem 0.45rem;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      min-width: 2.35rem;
      justify-content: center;
    }

    .session-standing-momentum .bi {
      font-size: 0.8rem;
    }

    #logMatchVoiceBtn.btn-action-danger::after,
    #logMatchVoiceBtn.btn-danger::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #dc3545;
      box-shadow: 0 0 0 6px rgba(220, 53, 69, 0.18);
      animation: sessionRecordPulse 1.2s infinite ease-out;
      pointer-events: none;
    }

    #logMatchVoiceBtn.btn-action-danger {
      background-color: #dc3545;
      border-color: #dc3545;
    }

    #logMatchVoiceBtn.btn-action-success {
      background-color: #198754;
      border-color: #198754;
    }

    #logMatchVoiceBtn.btn-action-warning {
      background-color: #ffc107;
      border-color: #ffc107;
    }

    #logMatchVoiceCaption:empty {
      display: block;
    }

    #logMatchVoiceCaption:empty::after {
      content: attr(data-default-caption);
      display: block;
      color: inherit;
      font-size: inherit;
    }

    #logMatchVoiceCaption {
      min-height: 2em;
      font-size: 1.1em;
      color: #333;
    }

    @keyframes sessionRecordPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.35);
        transform: scale(1);
      }

      70% {
        box-shadow: 0 0 0 8px rgba(220, 53, 69, 0);
        transform: scale(1.05);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
        transform: scale(1);
      }
    }

    @media (max-width: 576px) {
      .session-standing-grid {
        grid-template-columns: 2.8rem 2.6rem minmax(0, 1fr) auto;
        gap: 0.5rem;
      }
    }
  </style>
</head>

<body>
  <main layout:fragment="content" class="app-page">
    <th:block th:with="authPrincipal=${#authentication != null ? #authentication.principal : null}, sessionDateTimePattern='EEEE, MMM d, h:mm a'">
    <div class="app-page-header">
      <div>
        <h1 class="app-page-title"
            th:text="${isSessionLadder and sessionDisplayTitle != null and !#strings.isEmpty(sessionDisplayTitle)
                ? (ladder.createdAt != null
                    ? sessionDisplayTitle + ' - ' + @fhpbTime.pattern(ladder.createdAt, authPrincipal, sessionDateTimePattern)
                    : sessionDisplayTitle)
                : ladder.title}">Group</h1>
        <p class="app-page-subtitle">
          <span th:text="${isSessionLadder ? 'Temporary match session for quick global competition play.' : 'Invite players, manage members, and adjust group settings.'}">
            Invite players, manage members, and adjust group settings.
          </span>
          <span th:if="${isSessionLadder and ladder.expiresAt != null}">
            <span> Session expires at </span>
            <span th:text="${@fhpbTime.pattern(ladder.expiresAt, authPrincipal, sessionDateTimePattern)}">Saturday, Mar 15, 2:00 PM</span>
            <span>.</span>
          </span>
        </p>
      </div>
    </div>
    <div class="app-page-back">
      <a class="btn btn-nav-secondary btn-lg w-100"
         th:href="${isSessionLadder} ? @{/home} : (${isCompetitionLadder} ? @{/competition} : @{/private-groups/{ladderId}(ladderId=${ladder.id},seasonId=${season != null ? season.id : null})})">Back</a>
    </div>
    <div class="card-stack-col card-stack-col-desktop-fluid pb-5 text-start">
      <th:block th:if="${isSessionLadder}">
        <div th:replace="~{fragments/show/sessionBody :: sessionBody}"></div>
      </th:block>
      <th:block th:unless="${isSessionLadder}">
        <div th:replace="~{fragments/show/groupBody :: groupBody}"></div>
      </th:block>
    </div>
    </th:block>
  </main>

  <th:block layout:fragment="scripts">
    <script th:src="@{/js/session-nearby-share.js(v=${assetVersion})}" src="/js/session-nearby-share.js"></script>
    <script>
    (function () {
      ['banToast', 'unbanToast', 'inviteDisabledToast', 'joinedToast', 'leftToast', 'passwordChangedToast', 'matchLoggedToast'].forEach(function (id) {
        const el = document.getElementById(id);
        if (el && typeof bootstrap !== 'undefined' && bootstrap.Toast) {
          new bootstrap.Toast(el, { delay: 2000 }).show();
        }
      });

      function csrfHeaders(baseHeaders) {
        if (window.FHPB && window.FHPB.Csrf && typeof window.FHPB.Csrf.headers === 'function') {
          return window.FHPB.Csrf.headers(baseHeaders || {});
        }
        return baseHeaders || {};
      }

      function fetchJson(url, options) {
        return fetch(url, options).then(function (response) {
          return response.json().catch(function () { return {}; }).then(function (payload) {
            return { ok: response.ok, payload: payload };
          });
        });
      }

      (function () {
        const shareRoot = document.querySelector('[data-session-share-root]');
        if (!shareRoot) return;

        const buttons = Array.from(shareRoot.querySelectorAll('[data-session-share-tab]'));
        const panels = Array.from(document.querySelectorAll('[data-session-share-panel]'));
        if (!buttons.length || !panels.length) return;

        const activate = function (target) {
          if (!target) return;
          buttons.forEach(function (button) {
            const active = button.getAttribute('data-session-share-tab') === target;
            button.classList.toggle('is-active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });
          panels.forEach(function (panel) {
            const active = panel.getAttribute('data-session-share-panel') === target;
            if (active) {
              panel.removeAttribute('hidden');
            } else {
              panel.setAttribute('hidden', 'hidden');
            }
          });
        };

        buttons.forEach(function (button) {
          button.addEventListener('click', function () {
            activate(button.getAttribute('data-session-share-tab'));
          });
        });

        const initialButton =
            buttons.find(function (button) {
              return button.getAttribute('aria-pressed') === 'true';
            }) || buttons[0];
        activate(initialButton ? initialButton.getAttribute('data-session-share-tab') : null);
      })();

      const copyButtons = document.querySelectorAll('[data-copy-target]');
      copyButtons.forEach(function (btn) {
        const targetId = btn.getAttribute('data-copy-target');
        if (!targetId) return;
        const target = document.getElementById(targetId);
        if (!target) return;

        btn.addEventListener('click', function () {
          const originalText = btn.textContent;
          const value = target.value || target.textContent || '';
          if (!value) return;

          const showSuccess = function () {
            btn.classList.add('btn-action-success');
            btn.textContent = 'Copied!';
            setTimeout(function () {
              btn.classList.remove('btn-action-success');
              btn.textContent = originalText;
            }, 1500);
          };

          const handleFailure = function () {
            try {
              target.focus();
              if (target.select) {
                target.select();
                target.setSelectionRange(0, value.length);
              }
              const successful = document.execCommand && document.execCommand('copy');
              if (successful) {
                showSuccess();
                return;
              }
            } catch (e) {}
            alert('Copy failed. Select and copy manually.');
          };

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(value).then(showSuccess).catch(handleFailure);
          } else {
            handleFailure();
          }
        });
      });

      (function () {
        const panel = document.getElementById('sessionMembersPanel');
        if (!panel) return;

        const sessionId = panel.getAttribute('data-session-id');
        const list = panel.querySelector('[data-members-list]');
        const emptyState = panel.querySelector('[data-members-empty-state]');
        const title = panel.querySelector('[data-member-section-title]');
        if (!sessionId || !list || !emptyState || !title) return;

        const currentUserId = Number(panel.getAttribute('data-current-user-id'));
        const ownerUserId = Number(panel.getAttribute('data-owner-user-id'));
        const currentUserIsAdmin = panel.getAttribute('data-current-user-is-admin') === 'true';
        const leaveConfirmMessage = panel.getAttribute('data-leave-confirm-message') || 'Leave this session?';
        const leaveActionLabel = panel.getAttribute('data-leave-action-label') || 'Leave Session';

        const updateEmptyState = function () {
          const hasItems = list.children.length > 0;
          list.classList.toggle('d-none', !hasItems);
          emptyState.classList.toggle('d-none', hasItems);
        };

        const applyConfirmMessage = function (form, message) {
          if (!form || !message) return;
          form.setAttribute('onsubmit', 'return handleConfirmForm(this, ' + JSON.stringify(message) + ');');
        };

        const buildActionButton = function (label, className) {
          const button = document.createElement('button');
          button.type = 'submit';
          button.className = className;
          button.textContent = label;
          return button;
        };

        const buildItem = function (member) {
          const item = document.createElement('li');
          item.className = 'list-group-item';

          const row = document.createElement('div');
          row.className = 'd-flex flex-wrap align-items-start justify-content-between w-100 gap-2';

          const info = document.createElement('div');
          info.className = 'd-flex flex-column align-items-start gap-1 flex-grow-1 min-w-0';

          const nameRow = document.createElement('div');
          nameRow.className = 'd-flex flex-wrap align-items-center gap-2';

          const name = document.createElement('strong');
          name.textContent = member.displayName || 'missing name';
          nameRow.appendChild(name);

          if (member.courtName) {
            const court = document.createElement('span');
            court.className = 'text-muted';
            court.textContent = ' - ' + member.courtName;
            nameRow.appendChild(court);
          }

          info.appendChild(nameRow);

          const actions = document.createElement('div');
          actions.className = 'd-flex flex-wrap gap-2 flex-shrink-0 justify-content-end align-self-center';

          if (currentUserIsAdmin && member.userId !== currentUserId && member.userId !== ownerUserId) {
            const removeForm = document.createElement('form');
            removeForm.method = 'post';
            removeForm.className = 'm-0';
            removeForm.action = '/groups/' + sessionId + '/remove/' + member.membershipId;
            applyConfirmMessage(
              removeForm,
              'Remove this player from the session? They can rejoin later with the invite if there is space.');
            removeForm.appendChild(buildActionButton('Remove', 'btn btn-action-danger btn-inline'));
            actions.appendChild(removeForm);
          }

          if (member.userId === currentUserId) {
            const leaveForm = document.createElement('form');
            leaveForm.method = 'post';
            leaveForm.className = 'm-0';
            leaveForm.action = '/groups/' + sessionId + '/leave/' + member.membershipId;
            applyConfirmMessage(leaveForm, leaveConfirmMessage);
            leaveForm.appendChild(buildActionButton(leaveActionLabel, 'btn btn-action-danger btn-inline'));
            actions.appendChild(leaveForm);
          }

          row.appendChild(info);
          row.appendChild(actions);
          item.appendChild(row);
          return item;
        };

        const renderMembers = function (payload) {
          while (list.firstChild) {
            list.removeChild(list.firstChild);
          }
          if (payload && payload.memberSectionTitle) {
            title.textContent = payload.memberSectionTitle;
          }
          ((payload && payload.members) || []).forEach(function (member) {
            list.appendChild(buildItem(member));
          });
          updateEmptyState();
        };

        function loadMembers() {
          return fetchJson('/api/sessions/' + sessionId + '/members', {
            headers: { 'Accept': 'application/json' },
            credentials: 'same-origin'
          }).then(function (result) {
            if (!result.ok) return result;
            renderMembers(result.payload);
            return result;
          }).catch(function () {});
        }

        window.FHPB = window.FHPB || {};
        window.FHPB.SessionMembers = window.FHPB.SessionMembers || {};
        window.FHPB.SessionMembers.refresh = loadMembers;
      })();

      (function () {
        const panel = document.getElementById('sessionJoinRequestsPanel');
        if (!panel) return;

        const sessionId = panel.getAttribute('data-session-id');
        const list = panel.querySelector('[data-request-list]');
        const emptyState = panel.querySelector('[data-empty-state]');
        if (!sessionId || !list || !emptyState) return;

        const formatRequestedAt = function (value) {
          if (!value) return '';
          try {
            return new Date(value).toLocaleString([], {
              month: 'short',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            });
          } catch (e) {
            return value;
          }
        };

        const updateEmptyState = function () {
          const hasItems = list.children.length > 0;
          list.classList.toggle('d-none', !hasItems);
          emptyState.classList.toggle('d-none', hasItems);
        };

        const buildItem = function (request) {
          const item = document.createElement('li');
          item.className = 'list-group-item';
          item.setAttribute('data-request-id', request.id);

          const row = document.createElement('div');
          row.className = 'd-flex flex-wrap align-items-start justify-content-between gap-2';

          const info = document.createElement('div');
          info.className = 'flex-grow-1 min-w-0';

          const title = document.createElement('div');
          title.className = 'd-flex flex-wrap align-items-center gap-2';

          const name = document.createElement('strong');
          name.textContent = request.requesterDisplayName || 'Player';
          title.appendChild(name);

          if (request.requesterPublicCode) {
            const badge = document.createElement('span');
            badge.className = 'badge bg-light text-dark border';
            badge.textContent = request.requesterPublicCode;
            title.appendChild(badge);
          }

          const requested = document.createElement('div');
          requested.className = 'small text-muted';
          requested.textContent = 'Requested ' + formatRequestedAt(request.requestedAt);

          const status = document.createElement('div');
          status.className = 'small text-muted join-request-status';
          status.setAttribute('data-request-status', '');

          info.appendChild(title);
          info.appendChild(requested);
          info.appendChild(status);

          const actions = document.createElement('div');
          actions.className = 'd-flex flex-wrap gap-2';

          const allowBtn = document.createElement('button');
          allowBtn.type = 'button';
          allowBtn.className = 'btn btn-action-success btn-inline';
          allowBtn.setAttribute('data-request-action', 'approve');
          allowBtn.textContent = 'Allow';

          const denyBtn = document.createElement('button');
          denyBtn.type = 'button';
          denyBtn.className = 'btn btn-nav-secondary btn-inline';
          denyBtn.setAttribute('data-request-action', 'deny');
          denyBtn.textContent = 'Deny';

          actions.appendChild(allowBtn);
          actions.appendChild(denyBtn);
          row.appendChild(info);
          row.appendChild(actions);
          item.appendChild(row);

          [allowBtn, denyBtn].forEach(function (button) {
            button.addEventListener('click', function () {
              const action = button.getAttribute('data-request-action');
              const statusEl = item.querySelector('[data-request-status]');
              if (!action || !statusEl) return;
              statusEl.textContent = action === 'approve' ? 'Processing approval...' : 'Declining request...';
              fetchJson('/api/sessions/' + sessionId + '/join-requests/' + request.id + '/' + action, {
                method: 'POST',
                headers: csrfHeaders({ 'Accept': 'application/json' }),
                body: ''
              }).then(function (result) {
                if (!result.ok) {
                  statusEl.textContent =
                      result.payload && result.payload.message ? result.payload.message : 'Unable to update request.';
                  return;
                }
                if (result.payload && result.payload.status === 'PENDING') {
                  statusEl.textContent = result.payload.message || 'Request is still pending.';
                  return;
                }
                if (result.payload && result.payload.status === 'APPROVED'
                    && window.FHPB
                    && window.FHPB.SessionMembers
                    && typeof window.FHPB.SessionMembers.refresh === 'function') {
                  window.FHPB.SessionMembers.refresh();
                }
                loadRequests();
              }).catch(function () {
                statusEl.textContent = 'Unable to update request right now.';
              });
            });
          });

          return item;
        };

        const renderRequests = function (requests) {
          while (list.firstChild) {
            list.removeChild(list.firstChild);
          }
          (requests || []).forEach(function (request) {
            list.appendChild(buildItem(request));
          });
          updateEmptyState();
        };

        function loadRequests() {
          fetchJson('/api/sessions/' + sessionId + '/join-requests', {
            headers: { 'Accept': 'application/json' },
            credentials: 'same-origin'
          }).then(function (result) {
            if (!result.ok) return;
            renderRequests(result.payload);
          }).catch(function () {});
        }

        loadRequests();
        window.setInterval(loadRequests, 5000);
      })();

      (function () {
        const inviteLinkInput = document.getElementById('inviteLinkInput');
        const qrWrapper = document.getElementById('inviteQrCode');
        if (!inviteLinkInput || !qrWrapper) return;

        const renderQr = function () {
          if (typeof window.QRCode === 'undefined') return;
          const value = inviteLinkInput.value;
          if (!value) return;

          while (qrWrapper.firstChild) {
            qrWrapper.removeChild(qrWrapper.firstChild);
          }

          try {
            new window.QRCode(qrWrapper, {
              text: value,
              width: 176,
              height: 176,
              correctLevel: window.QRCode.CorrectLevel.M,
              colorDark: '#000000',
              colorLight: '#ffffff'
            });
            const qrImage = qrWrapper.querySelector('img');
            if (qrImage) {
              qrImage.alt = '';
              qrImage.setAttribute('aria-hidden', 'true');
            }
            const qrCanvas = qrWrapper.querySelector('canvas');
            if (qrCanvas) {
              qrCanvas.setAttribute('aria-hidden', 'true');
            }
          } catch (err) {
            qrWrapper.textContent = 'QR unavailable';
          }
        };

        if (typeof window.QRCode !== 'undefined') {
          renderQr();
          return;
        }

        const scriptId = 'fhpb-invite-qr-lib';
        let loader = document.getElementById(scriptId);
        if (!loader) {
          loader = document.createElement('script');
          loader.id = scriptId;
          loader.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
          loader.async = true;
          loader.addEventListener('load', renderQr, { once: true });
          loader.onerror = function () {
            qrWrapper.textContent = 'QR unavailable';
          };
          document.head.appendChild(loader);
        } else {
          loader.addEventListener('load', renderQr, { once: true });
        }
      })();
    })();
    </script>
  </th:block>
</body>

</html>
