<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/authenticated}">
<head>
    <title layout:fragment="title">Round-Robin View</title>
</head>
<body>
<div layout:fragment="content" class="app-page">
    <div class="app-page-header">
        <div>
            <h1 class="app-page-title">Round-Robin</h1>
            <p class="app-page-subtitle">View pairings, progress, and results for this round-robin.</p>
        </div>
    </div>
    <div class="app-page-back">
        <a class="btn btn-nav-secondary btn-lg w-100"
           th:href="${roundRobinListPath}">
            Back
        </a>
    </div>
    <div class="container">
    <div class="card mb-4 shadow card-spotlight">
        <div class="card-header card-header-title">Round-Robin</div>
        <div class="card-body">
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Round <span th:text="${currentRound}"></span>
                        <span th:if="${maxRound != null and maxRound > 0}"> of <span th:text="${maxRound}"></span></span>
                        <span th:if="${roundComplete}" class="badge text-bg-success ms-2">Completed</span>
                    </h5>
                </div>

                
                <div class="d-flex gap-2 justify-content-center align-items-center mt-2 mb-3">
                    <a th:href="@{/round-robin/view/{id}(id=${roundRobinId}, round=${currentRound - 1})}" 
                       th:classappend="${currentRound <= 1 ? 'disabled' : ''}"
                       class="btn btn-sm btn-nav-secondary">
                        <i class="bi bi-chevron-left"></i> Previous
                    </a>
                    <a th:href="@{/round-robin/view/{id}(id=${roundRobinId}, round=${currentRound + 1})}" 
                       th:classappend="${currentRound >= maxRound ? 'disabled' : ''}"
                       class="btn btn-sm btn-nav-secondary">
                        Next <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th class="text-center">Match</th>
                        <th class="text-center">Players</th>
                    </tr>
                    </thead>
                    <tbody>
                    
                    <tr th:each="e : ${entries}" th:if="${!e.bye}">
                        <td class="text-center align-middle" th:text="${e.displayIndex}"></td>
                        <td>
                            
                            <div class="d-flex flex-column text-center small">
                                
                                <span th:text="${e.a1Name != null ? e.a1Name : (e.b1Name != null ? e.b1Name : '')}"></span>

                                
                                <span th:text="${e.a2Name != null ? e.a2Name : ''}"></span>

                                
                                <span class="fw-bold">vs</span>

                                
                                <span th:text="${e.b1Name != null ? e.b1Name : ''}"></span>

                                
                                <span th:text="${e.b2Name != null ? e.b2Name : ''}"></span>

                                
                                <div class="mt-1">
                                    <small class="text-muted">
                                        <span th:if="${e['result'] != null}" th:text="${e['result']}"></span>
                                        <span th:if="${e['result'] == null}" th:text="${e['status']}"></span>
                                    </small>
                                    <div th:if="${e.quickLogEnabled}" class="mt-2">
                                        <a class="btn btn-sm btn-nav-secondary"
                                           th:href="@{/log-match(ladderId=${roundRobinLadderId},seasonId=${roundRobinSeasonId},a1=${e.quickLogA1},a2=${e.quickLogA2},b1=${e.quickLogB1},b2=${e.quickLogB2},returnToRoundRobinId=${roundRobinId},returnToRoundRobinEntryId=${e.entryId},returnToRoundRobinRound=${currentRound})}">
                                            Quick Log
                                        </a>
                                    </div>
                                    <div th:if="${e.confirmEnabled}" class="mt-2 d-flex justify-content-center"
                                         data-skip-confirm-fragment-refresh="true"
                                         th:insert="~{fragments/matchRow :: matchRow_confirmation(match=${e.linkedMatch}, pendingForCurrentUser=${true}, waitingOnOpponent=${false}, deletable=${false})}">
                                    </div>
                                    <div th:if="${e.editEnabled}" class="mt-2">
                                        <a class="btn btn-sm btn-nav-secondary"
                                           th:href="@{/log-match(editMatchId=${e.editMatchId},returnToRoundRobinId=${roundRobinId},returnToRoundRobinRound=${currentRound})}">
                                            Edit
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </td>
                        
                    </tr>

                    
                    <tr th:if="${allParticipants != null && !allParticipants.isEmpty()}">
                        <td class="text-center"></td>
                        <td colspan="3">
                            <div class="text-start">
                                <div class="fw-semibold mb-2">All Participants</div>
                                <div class="d-flex flex-wrap gap-2">
                                    <span th:each="p : ${allParticipants}" 
                                          th:class="${'badge ' + (p.status == 'playing' ? 'bg-success' : (p.status == 'bye' ? 'bg-secondary' : 'bg-warning'))}">
                                        <span th:text="${p.name}">Player</span>
                                        <span class="ms-1" th:text="${'(' + p.statusLabel + ')'}"></span>
                                    </span>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </div>

            <div th:if="${!standings.isEmpty()}" class="mt-4">
                
                <div th:replace="~{fragments/roundrobinStandings :: standingsTable(${standings}, ${standingsTitle})}"></div>
            </div>
            <div th:if="${standings.isEmpty()}" class="card mt-4 shadow-sm">
                <div class="card-body text-center text-muted">
                    <i class="bi bi-trophy"></i> Standings will appear once matches are confirmed.
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
</body>
</html>
