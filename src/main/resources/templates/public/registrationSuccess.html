      layout:decorate="~{layouts/public}">

<head>
  <title layout:fragment="title">Registration Success</title>
</head>

<body>

      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
          <div class="card mb-4 box-shadow text-center p-4">

            <h4 class="mt-3">

        </div>

    </div>
  </div>
