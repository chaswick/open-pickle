<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/public}">

<head>
  <title layout:fragment="title">Registration Submitted</title>
</head>

<body>
  <div layout:fragment="content">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
          <div class="card mb-4 box-shadow text-center p-4">
            <h3>Thanks for submitting the registration form.</h3>
            <p class="mt-3 mb-0 text-muted">
              If your account was created, you can log in now.
            </p>
            <p class="mt-2 text-muted">
              If you cannot log in, return to registration and try again without browser autofill, or contact support.
            </p>
            <h4 class="mt-3">
              <a th:href="@{/login}">Go to Login</a>
            </h4>
            <p class="mt-2 mb-0">
              <a th:href="@{/register}">Back to Registration</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
