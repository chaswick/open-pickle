<!doctype html>
<html lang="en" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/public}">

<head>
    <title layout:fragment="title">Accept Terms</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="album py-5">
            <div class="container content-layer">
                <div class="row justify-content-center">
                    <div class="d-none d-lg-block col-lg-3"></div>
                    <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                        <div class="card mb-4 box-shadow text-center">
                            <div class="p-3 p-sm-4">
                                <form method="post" th:action="@{/accept-terms}">
                                    <input type="hidden" name="returnTo" th:value="${returnTo}" th:if="${returnTo}" />

                                    <h4 class="mt-1 mb-3">Accept Terms of Service</h4>

                                    <p class="mb-3">Before continuing, please accept the Terms of Service and Privacy Policy.</p>

                                    <div class="form-check text-start mt-3">
                                        <input class="form-check-input" type="checkbox" id="acceptTerms" name="acceptTerms" required>
                                        <label class="form-check-label" for="acceptTerms">
                                            I agree to the
                                            <a class="text-decoration-none" th:href="${termsHref}">Terms of Service</a>
                                            and
                                            <a class="text-decoration-none" th:href="${privacyHref}">Privacy Policy.</a>
                                        </label>
                                    </div>

                                    <button type="submit" class="btn btn-action-primary btn-lg d-block mx-auto mt-3 w-100">Accept and Continue</button>
                                </form>

                                <form th:action="@{/logout}" method="post" class="mt-3">
                                    <button type="submit" class="btn btn-nav-secondary btn-lg d-block mx-auto w-100">
                                        <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>
                                        Logout
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="d-none d-lg-block col-lg-3"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
