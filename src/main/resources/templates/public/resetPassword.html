<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/public}">

<head>
  <title layout:fragment="title">Reset Password</title>
  
  
  <style layout:fragment="styles">
    body {
      background-color: #f5f5f5;
    }
    .card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem 0 rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>
  <div layout:fragment="content">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
          <div class="card mb-4 box-shadow text-center">
            
            <form th:action="@{/reset-password}" method="post" class="p-3 p-sm-4">
              <h4 class="mt-1 mb-3">Reset Your Password</h4>
              <input type="hidden" name="token" th:value="${token}" />

              <div class="mb-3 text-start">
                <label class="form-label" for="password">Password:</label>
                <input id="password" type="password" name="password" class="form-control"
                       placeholder="Password" required autocomplete="off"
                       th:attr="pattern=${passwordPattern}" th:attrappend="title=${passwordRequirements}"
                       oninvalid="this.setCustomValidity('Choose a password')"
                       oninput="this.setCustomValidity('')" />
                <p class="form-text small text-muted mb-0" th:text="${passwordRequirements}"></p>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label" for="confirm_password">Confirm Password:</label>
                <input id="confirm_password" type="password" name="confirm_password" class="form-control"
                       placeholder="Confirm password" required autocomplete="off"
                       th:attr="pattern=${passwordPattern}" th:attrappend="title=${passwordRequirements}"
                       oninvalid="this.setCustomValidity('Confirm password')"
                       oninput="this.setCustomValidity('')" />
              </div>

              <div th:if="${error != null}" class="mb-3">
                <p class="text-danger mb-0">[[${error}]]</p>
              </div>
              <div th:if="${message != null}" class="mb-3">
                <p class="text-primary mb-0">[[${message}]]</p>
              </div>

              <button type="submit" class="btn btn-action-primary btn-lg d-block mx-auto mt-3 w-100">
                Change Password
              </button>
              <a th:href="@{/}" class="btn btn-nav-secondary btn-lg d-block mx-auto mt-3 w-100">
                <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>
                Back to Home
              </a>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  
  <script layout:fragment="scripts">
    var password = document.getElementById("password"),
        confirm_password = document.getElementById("confirm_password");

    function validatePassword() {
      if (password.value != confirm_password.value) {
        confirm_password.setCustomValidity("Passwords Don't Match");
      } else {
        confirm_password.setCustomValidity('');
      }
    }

    password.onchange = validatePassword;
    confirm_password.onkeyup = validatePassword;
  </script>
</body>
</html>
