<!doctype html>
<html lang="en" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/public}">

<head>
    <title layout:fragment="title">Log in</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="album py-5">
            <div class="container content-layer">
                <div class="row justify-content-center">
                    
                    <div class="d-none d-lg-block col-lg-3"></div>

                    <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                        
                        <div class="card mb-4 box-shadow text-center" sec:authorize="!isAuthenticated()">
                            <form method="post" action="/login" th:action="@{/login}" class="p-3 p-sm-4">
                                <input type="hidden" name="returnTo" th:value="${returnTo}" th:if="${returnTo}" />

                                <h4 class="mt-1 mb-3">Log in</h4>

                                <div class="alert alert-primary mb-3" role="alert" th:text="${message}" th:if="${message}"></div>

                                <div class="mb-3 text-start">
                                    <label class="form-label" for="user">E-mail:</label>
                                    <input type="text" id="user" name="user" class="form-control"
                                           placeholder="Username" required autofocus autocomplete="off" maxlength="30" />
                                </div>

                                <div class="mb-3 text-start">
                                    <label class="form-label" for="password">Password:</label>
                                    <input type="password" id="password" name="password" class="form-control"
                                           placeholder="Password" required autocomplete="off" />
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-3 text-start">
                                    <div class="form-check m-0">
                                        <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">Remember me</label>
                                    </div>
                                    <a class="small" th:href="@{/forgot-password}">Forgot password?</a>
                                </div>

                                <button type="submit" class="btn btn-action-primary btn-lg d-block mx-auto mt-3 w-100">Login</button>
                                <div class="mt-3">
                                    <span class="text-muted small">New to <span th:text="${branding.appName}">the app</span>?</span>
                                    <a class="btn btn-nav-primary btn-lg d-block mx-auto mt-2 w-100"
                                       th:href="@{/register}">
                                        Create an Account
                                    </a>
                                </div>
                                <a th:href="@{/}" class="btn btn-nav-secondary btn-lg d-block mx-auto mt-3 w-100">
                                  <i class="fas fa-arrow-left me-2" aria-hidden="true"></i>
                                  Back to Home
                                </a>
                            </form>
                        </div>
                        
                        
                        <div sec:authorize="isAuthenticated()">
                            <div class="card mb-4 box-shadow text-center">
                                <div class="p-3 p-sm-4">
                                    <h4 class="mb-3">Already logged in</h4>
                                    <p class="mb-3">Logged in as <span th:text="${userName ?: 'your account'}">your account</span></p>
                                    <form th:action="@{/logout}" method="post" class="d-inline-block">
                                        <button type="submit" class="btn btn-action-danger btn-lg w-100 mb-2">Logout</button>
                                    </form>
                                    <a th:href="@{/home}" class="btn btn-nav-primary btn-lg w-100">Go Home</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-none d-lg-block col-lg-3"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
