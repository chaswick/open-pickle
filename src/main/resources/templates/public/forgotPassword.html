<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/public}">

<head>
  <title layout:fragment="title">Forgot Password</title>
  
  
  <style layout:fragment="styles">
    body {
      background-color: #f5f5f5;
    }
    .card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem 0 rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>
  <div layout:fragment="content">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
          <div class="card mb-4 box-shadow text-center">
            <form th:action="@{/forgot-password}" method="post" class="p-3 p-sm-4">
              
              <h4 class="mt-1 mb-3">Forgot Password</h4>

              <div class="mb-3 text-start">
                <p class="mb-0">We will send a reset password link to your email.</p>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label" for="email">E-mail:</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="Enter your e-mail" required autofocus />
              </div>

              <div th:if="${error != null}" class="mb-3">
                <p class="text-danger mb-0">[[${error}]]</p>
              </div>

              <div th:if="${message != null}" class="mb-3">
                <p class="text-primary mb-0">[[${message}]]</p>
              </div>

              <button type="submit" class="btn btn-action-primary btn-lg d-block mx-auto mt-3 w-100">Send</button>
              <a th:href="@{/login}" class="btn btn-nav-secondary btn-lg d-block mx-auto mt-3 w-100">
                <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>
                Back to Login
              </a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
