<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/authenticated}">

<head>
  <title layout:fragment="title">Error</title>
</head>

<body>
  <div layout:fragment="content">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card">
          <div class="card-body text-center">
            <div class="mb-4">
              <i class="fas fa-exclamation-triangle text-warning display-1"></i>
            </div>
            <h1 class="h3 mb-3">Something went wrong</h1>
            <p class="text-muted mb-4" th:text="${message} ?: 'Please try again.'">Please try again.</p>
            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
              <a href="javascript:history.back()" class="btn btn-nav-secondary">
                <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>
                Go Back
              </a>
              <a th:href="@{/home}" class="btn btn-action-primary">Go Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
